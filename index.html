<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Morris Image Gallery</title>
</head>
<body>
    <div class="retro-container">
        <header class="retro-header">
            <h1 class="retro-title">Morris Image Gallery</h1>
            <div class="retro-badge">RETRO-FUTURISTIC</div>
        </header>
        
        <main class="retro-main">
            <div class="image-display">
                <div class="image-frame">
                    <img id="morrisImage" src="https://morrisapi.starnumber12046.workers.dev/morris" 
                         alt="Morris Image" class="retro-image">
                </div>
                <div class="loading-indicator" id="loadingIndicator"></div>
            </div>
            
            <div class="controls-section">
                <button id="newImageButton" class="retro-button">
                    🔄 Get New Morris Image
                </button>
                <div class="status-display" id="statusDisplay"></div>
            </div>
        </main>
        
        <footer class="retro-footer">
            <p class="retro-subtitle">A journey through time and space</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
